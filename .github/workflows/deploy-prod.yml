name: Deploy Frontend to Production

on:
  push:
    branches:
      - main
    paths:
      - 'fe/**'

env:
  PROJECT_ID: v1-mvp
  REGION: us-east1
  REPO: fe-prod
  IMAGE: fe

jobs:
  test:
    # Reuses the standalone test workflow — keeps the npm test command in one
    # place and ensures the deploy can't run unless tests are green.
    uses: ./.github/workflows/test.yml

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        working-directory: fe
        run: npm ci

      - name: Lint
        working-directory: fe
        run: npm run lint

  build-and-push:
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        working-directory: fe
        run: |
          docker build \
            --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}" \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} .
          docker build \
            --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}" \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest

  update-helm:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cloud repo
        uses: actions/checkout@v4
        with:
          repository: Ppa-Dun-project/PPA-DUN-cloud
          ref: infra/helm-chart-setup
          token: ${{ secrets.GH_PAT }}

      - name: Update image tag
        run: |
          sed -i '/ppaDunFe:/,/port:/ s|tag: .*|tag: "${{ github.sha }}"|' helm/ppa-dun/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/ppa-dun/values.yaml
          git commit -m "deploy: update ppa-dun-fe image to ${{ github.sha }}"
          git push

  notify:
    needs: update-helm
    if: always()
    uses: ./.github/workflows/discord-deploy-notify.yml
    with:
      status: ${{ needs.update-helm.result }}
      service: Frontend (Prod)
    secrets:
      DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
