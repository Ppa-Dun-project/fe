name: Test

# Runs the FE Vitest suite (unit + integration, both jsdom-based with no real
# network or DB). Triggers:
#   - push to develop / main — feedback after merge.
#   - pull_request targeting develop / main — gates the merge button when
#     branch protection is enabled in GitHub Settings.
#   - workflow_call — exposes this workflow as reusable so deploy-dev.yml /
#     deploy-prod.yml can require a green test run before building.

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        working-directory: fe
        run: npm ci

      - name: Run vitest
        working-directory: fe
        run: npm test
