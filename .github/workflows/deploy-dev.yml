name: Deploy Frontend to Dev Server

on:
  push:
    branches:
      - develop

env:
  GCP_ZONE: us-east1-b

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        working-directory: fe
        run: npm ci

      - name: Build
        working-directory: fe
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Dev Server
        run: |
          gcloud compute ssh ${{ secrets.DEV_INSTANCE_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --command="sudo mkdir -p /app/fe/dist"
          gcloud compute scp --recurse fe/dist/* \
            ${{ secrets.DEV_INSTANCE_NAME }}:/app/fe/dist/ \
            --zone=${{ env.GCP_ZONE }}

  notify-success:
    needs: build-and-deploy
    if: success()
    uses: ./.github/workflows/discord-deploy-notify.yml
    with:
      status: 'success'
      service: 'Frontend'
    secrets:
      DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}

  notify-failure:
    needs: build-and-deploy
    if: failure()
    uses: ./.github/workflows/discord-deploy-notify.yml
    with:
      status: 'failure'
      service: 'Frontend'
    secrets:
      DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
