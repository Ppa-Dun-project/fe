name: Deploy Frontend to Dev Server

on:
  push:
    branches:
      - develop

env:
  GCP_PROJECT_ID: v1-mvp
  GCP_REGION: us-east1
  GCP_ZONE: us-east1-b
  IMAGE_NAME: fe-dev
  REGISTRY: us-east1-docker.pkg.dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.set-image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: fe/package-lock.json

      - name: Install dependencies
        working-directory: fe
        run: npm ci

      - name: Build
        working-directory: fe
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set image name
        id: set-image
        run: echo "image=${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} -f fe/Dockerfile fe/

      - name: Push to Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}
          docker push ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Dev Server
        run: |
          gcloud compute ssh ${{ secrets.DEV_INSTANCE_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --command="docker pull ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} && \
                       docker stop ${{ env.IMAGE_NAME }} || true && \
                       docker rm ${{ env.IMAGE_NAME }} || true && \
                       docker run -d --name ${{ env.IMAGE_NAME }} -p 80:80 ${{ env.REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

  notify-success:
    needs: build-and-deploy
    if: success()
    uses: ./.github/workflows/discord-deploy-notify.yml
    with:
      status: 'success'
      service: 'Frontend'
      image: ${{ needs.build-and-deploy.outputs.image }}
    secrets:
      DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}

  notify-failure:
    needs: build-and-deploy
    if: failure()
    uses: ./.github/workflows/discord-deploy-notify.yml
    with:
      status: 'failure'
      service: 'Frontend'
    secrets:
      DISCORD_DEPLOY_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK }}
